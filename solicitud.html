<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitudes de Viaje - Ride to Class</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/solicitud.css">

</head>
<body class="dashboard-body">
    <div class="container full-width">
        <div class="back-nav" onclick="window.location.href='home.html'">
            <i class="fas fa-arrow-left"></i>

        </div>

        <div class="status-header-bar">
            <div style="display: flex; align-items: center; gap: 5px;">
                <div class="online-dot"></div>

            </div>
            <button class="card bg-green" style="margin-bottom: 0; padding: 10px 40px; border: none; color: white; font-weight: bold; width: auto;">

        </div>

        <nav class="bottom-naav">
            <div class="nav-btn" onclick="window.location.href='home.html'"><i class="fas fa-home"></i><span>Inicio</span></div>
            <div class="nav-btn active"><i class="fas fa-history"></i><span>Viajes</span></div>
