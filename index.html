<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>Ride to Class - Transporte Estudiantil</title>
  <meta name="description" content="Transporte estudiantil seguro y confiable">
  <meta name="theme-color" content="#00d4aa">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- PWA Meta Tags -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Ride to Class">

</head>

<body>
  <!-- Pantalla de Login -->
  <div id="login-screen" class="screen active">
    <div class="login-container">
      <div class="login-header">
        <div class="logo-circle">
          <i class="fas fa-graduation-cap"></i>
        </div>
        <h1>Ride to Class</h1>
        <p class="subtitle">TRANSPORTE ESTUDIANTIL</p>
        <p class="tagline">Viaja con confianza, estudia sin límites</p>
      </div>

      <div class="login-card">
        <div class="auth-tabs">
          <button class="tab-btn active" id="login-tab">
            <i class="fas fa-sign-in-alt"></i>
          </button>
          <button class="tab-btn" id="register-tab">
            <i class="fas fa-user-plus"></i>
          </button>
        </div>

        <form id="login-form" class="auth-form active">
          <div class="form-group">
            <label>
              <i class="fas fa-envelope"></i>
              EMAIL
            </label>
            <div class="input-wrapper">
              <i class="fas fa-envelope"></i>
              <input type="email" id="login-email" placeholder="Ingresa tu email" required>
            </div>
          </div>

          <div class="form-group">
            <label>
              <i class="fas fa-lock"></i>
              CONTRASEÑA
            </label>
            <div class="input-wrapper">
              <i class="fas fa-lock"></i>
              <input type="password" id="login-password" placeholder="Ingresa tu contraseña" required>
            </div>
          </div>

          <button type="submit" class="btn-primary">
            <i class="fas fa-sign-in-alt"></i>
            INICIAR SESIÓN
          </button>

          <a href="#" class="forgot-password">
            <i class="fas fa-question-circle"></i>
            ¿Olvidaste tu contraseña?
          </a>
        </form>

        <form id="register-form" class="auth-form">
          <div class="form-group">
            <label>
              <i class="fas fa-user-tag"></i>
              TIPO DE USUARIO
            </label>
            <div class="user-type-selector">
              <button type="button" class="user-type-btn active" data-type="passenger">
                <i class="fas fa-user"></i>
                <span>Pasajero</span>
              </button>
              <button type="button" class="user-type-btn" data-type="driver">
                <i class="fas fa-car"></i>
                <span>Conductor</span>
              </button>
            </div>
            <input type="hidden" id="user-type" value="passenger" required>
          </div>

          <div class="form-group">
            <label>
              <i class="fas fa-user"></i>
              NOMBRE
            </label>
            <div class="input-wrapper">
              <i class="fas fa-user"></i>
              <input type="text" id="reg-name" placeholder="Ingresa tu nombre" required>
            </div>
          </div>

          <div class="form-group">
            <label>
              <i class="fas fa-envelope"></i>
              EMAIL
            </label>
            <div class="input-wrapper">
              <i class="fas fa-envelope"></i>
              <input type="email" id="reg-email" placeholder="Ingresa tu email" required>
            </div>
          </div>

          <div class="form-group" id="phone-group" style="display: none;">
            <label>
              <i class="fas fa-phone"></i>
              TELÉFONO
            </label>
            <div class="input-wrapper">
              <i class="fas fa-phone"></i>
              <input type="tel" id="reg-phone" placeholder="Ingresa tu teléfono">
            </div>
          </div>

          <div class="form-group" id="license-group" style="display: none;">
            <label>
              <i class="fas fa-id-card"></i>
              LICENCIA DE CONDUCIR
            </label>
            <div class="input-wrapper">
              <i class="fas fa-id-card"></i>
              <input type="text" id="reg-license" placeholder="Número de licencia">
            </div>
          </div>

          <div class="form-group" id="vehicle-group" style="display: none;">
            <label>
              <i class="fas fa-car-side"></i>
              VEHÍCULO
            </label>
            <div class="input-wrapper">
              <i class="fas fa-car-side"></i>
              <input type="text" id="reg-vehicle" placeholder="Marca y modelo del vehículo">
            </div>
          </div>

          <div class="form-group">
            <label>
              <i class="fas fa-lock"></i>
              CONTRASEÑA
            </label>
            <div class="input-wrapper">
              <i class="fas fa-lock"></i>
              <input type="password" id="reg-password" placeholder="Crea una contraseña" required>
            </div>
          </div>

          <button type="submit" class="btn-primary">
            <i class="fas fa-user-plus"></i>
            REGISTRARSE
          </button>
        </form>
      </div>
    </div>
  </div>
