<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Ride to Class - Transporte Estudiantil</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js').catch(err => console.log(err));
            });
        }
    </script>
</head>

<body>
    <div id="login-screen" class="screen active">
        <div class="login-container">
            <div class="login-header">
                <div class="logo-circle">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <h1>Ride to Class</h1>
                <p class="tagline">Viaja con confianza, estudia sin límites</p>
            </div>
            <!-- Botones de inicio de session y registarse -->
            <div class="login-card">
                <div class="auth-tabs">
                    <button class="tab-btn active" id="login-tab">
                        <i class="fas fa-sign-in-alt"></i>
                    </button>
                    <button class="tab-btn" id="register-tab">
                        <i class="fas fa-user-plus"></i>
                    </button>
                </div>
                
                <form id="login-form" class="auth-form active">
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> EMAIL</label>
                        <div class="input-wrapper">
                            <input type="email" id="login-email" placeholder="Ingresa tu email" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> CONTRASEÑA</label>
                        <div class="input-wrapper">
                            <input type="password" id="login-password" placeholder="Ingresa tu contraseña" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary">ENTRAR</button>
                </form>

                <form id="register-form" class="auth-form">
                    <p style="text-align: center; color: var(--text-secondary); margin-bottom: 15px;">Selecciona tu
                        perfil para continuar:</p>
                    <div class="auth-footer" style="display: flex; flex-direction: column; gap: 12px;">
                        <button type="button" id="btn-goto-pasajero" class="btn-primary">
                            <i class="fas fa-user-graduate"></i> REGISTRO COMO PASAJERO
                        </button>

                        <button type="button" id="btn-goto-conductor" class="btn-primary">
                            <i class="fas fa-car"></i> REGISTRO COMO CONDUCTOR
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Lógica para cambiar entre pestañas Login/Registro
            const loginTab = document.getElementById('login-tab');
            const registerTab = document.getElementById('register-tab');
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');

            loginTab.addEventListener('click', () => {
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
                loginForm.classList.add('active');
                registerForm.classList.remove('active');
            });

            registerTab.addEventListener('click', () => {
                registerTab.classList.add('active');
                loginTab.classList.remove('active');
                registerForm.classList.add('active');
                loginForm.classList.remove('active');
            });

            // Redirecciones a las páginas externas
            document.getElementById('btn-goto-pasajero').addEventListener('click', () => {
                window.location.href = 'registro_usuarios.html';
            });

            document.getElementById('btn-goto-conductor').addEventListener('click', () => {
                window.location.href = 'registro_conductor.html';
            });
        });
    </script>
</body>

</html>
