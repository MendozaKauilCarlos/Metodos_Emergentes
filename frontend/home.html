<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ride to Class - Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dashboard-body">
    <div class="container full-width">
        <header class="user-header">
            <div class="user-info">
                <i class="fas fa-user-circle profile-icon"></i>
                <div>
                    <span class="greeting">¡Buenas tardes!</span>
                    <h3 id="display-name">Usuario</h3>
                </div>
            </div>
            <i class="fas fa-bell notification-badge"></i>
        </header>

        <div class="action-buttons">
            <div class="card bg-red">
                <div class="card-content">
                    <i class="fas fa-phone-alt"></i>
                    <div>
                        <strong>Emergencia 911</strong>
                        <small>Llamar a emergencias</small>
                    </div>
                </div>
                <i class="fas fa-chevron-right"></i>
            </div>

            <div class="card bg-green">
                <div class="card-content">
                    <i class="fas fa-toggle-on"></i>
                    <div>
                        <strong>Conectarse</strong>
                        <small>Disponible para recibir viajes</small>
                    </div>
                </div>
                <i class="fas fa-chevron-right"></i>
            </div>
        </div>

        <div class="menu-options">
            <div class="menu-item">
                <i class="fas fa-bell"></i>
                <span>Solicitudes de Viaje</span>
                <i class="fas fa-chevron-right"></i>
            </div>
            <div class="menu-item">
                <i class="fas fa-route"></i>
                <span>Viajes Activos</span>
                <i class="fas fa-chevron-right"></i>
            </div>
        </div>

        <section class="stats-section">
            <h4>Viajes Recientes</h4>
            <div class="stats-grid">
                <div class="stat-card">
                    <i class="fas fa-snake green-icon"></i>
                    <strong>12</strong>
                    <span>VIAJES COMPLETADOS</span>
                </div>
                <div class="stat-card">
                    <i class="fas fa-star green-icon"></i>
                    <strong>4.8</strong>
                    <span>CALIFICACIÓN</span>
                </div>
            </div>
        </section>

        <nav class="bottom-nav">
            <div class="nav-btn active"><i class="fas fa-home"></i><span>Inicio</span></div>
            <div class="nav-btn"><i class="fas fa-history"></i><span>Viajes</span></div>
            <div class="nav-btn"><i class="fas fa-map"></i><span>Mapa</span></div>
            <div class="nav-btn"><i class="fas fa-user"></i><span>Perfil</span></div>
        </nav>
    </div>

    <script src="js/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('usuarioActivo'));
            const token = localStorage.getItem('token');
            if (!user || !token) {
                window.location.href = 'index.html';
                return;
            }
            document.getElementById('display-name').innerText = (user.nombre || user.email || 'Usuario').toUpperCase();
            const btnConectar = document.querySelector('.bg-green');
            if (btnConectar) btnConectar.onclick = toggleConexion;
        });
    </script>
</body>
</html>
