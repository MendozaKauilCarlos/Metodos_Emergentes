<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ride to Class - Oficial</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo-circle"><i class="fas fa-graduation-cap"></i></div>
            <h1>Ride to Class</h1>
            <h2 class="subtitle">TRANSPORTE ESTUDIANTIL</h2>
            <p class="tagline">Viaja con confianza, estudia sin límites</p>
        </header>

        <main class="login-card">
            <div class="tabs">
                <button id="t-login" class="tab active" onclick="ver('L')"><i class="fas fa-sign-in-alt"></i></button>
                <button id="t-reg" class="tab" onclick="ver('R')"><i class="fas fa-user-plus"></i></button>
            </div>

            <div id="v-login">
                <form class="login-form" id="form-login">
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> EMAIL INSTITUCIONAL</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope input-icon"></i>
                            <input type="email" id="login-email" placeholder="tu.email@itcancun.edu.mx" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> CONTRASEÑA</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" id="login-password" placeholder="Ingresa tu contraseña">
                        </div>
                    </div>
                    <p id="login-error" class="error-msg hidden"></p>
                    <button type="submit" class="submit-btn" id="btn-login"><i class="fas fa-sign-in-alt"></i> INICIAR SESIÓN</button>
                </form>
            </div>

            <div id="v-reg" class="hidden">
                <div class="type-selector">
                    <button type="button" id="b-pas" class="type-btn active" onclick="rol('p')">Pasajero</button>
                    <button type="button" id="b-con" class="type-btn" onclick="rol('c')">Conductor</button>
                </div>
                <form class="login-form" id="form-reg">
                    <input type="text" id="reg-nombre" placeholder="Nombre completo" required style="padding-left: 15px; margin-bottom: 10px;">
                    <input type="email" id="reg-email" placeholder="tu.email@itcancun.edu.mx" required style="padding-left: 15px; margin-bottom: 10px;">
                    <div id="e-con" class="hidden">
                        <input type="text" id="reg-vehiculo" placeholder="Datos del vehículo (Placas/Modelo)" style="padding-left: 15px; margin-bottom: 10px;">
                    </div>
                    <input type="password" id="reg-password" placeholder="Crea tu contraseña" style="padding-left: 15px;">
                    <p id="reg-error" class="error-msg hidden"></p>
                    <button type="submit" class="submit-btn" id="btn-reg">REGISTRARSE</button>
                </form>
            </div>
            <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
        </main>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
